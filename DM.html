    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

.painel{
    padding:30px;

    display:grid;
    grid-template-columns:
        max-content
        300px
        180px;

    gap:20px;

    justify-content:center;
    align-items:start;
}

.players{
    display:flex;
    gap:10px;
}

.player-card{
    text-align: center;
    width:150px;
    min-height:270px;
    background-color: #a6a6a6;
    padding: 10px;
    border-radius: 20px;
}

.player-card img{
    width:90px;
    height:90px;
    border-radius:50%;
    display:block;
    margin:auto;
    margin-bottom:10px;
    background-color: white;
    padding-top: 15px;
    padding-left: 10px;
    padding-right: 10px;
}

.player-card h3{
    margin-bottom:10px;
    margin-top:20px;
}

button{
    border:none;
    background:#39a6ee;
    color:white;
    font-weight:bold;
    border-radius:12px;
    padding:8px;
    cursor:pointer;
}

.player-card button{
    width:100%;
    margin-top:8px;
}

.sidebar{
    width:300px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.box{
    width:100%;
    background:#adadad;
    border-radius:12px;
    padding:14px;
}

.box h2{
    font-size:28px;
    margin-bottom:15px;
}

.controls{
    display:flex;
    gap:8px;
    align-items:center;
    margin-bottom:15px;
}

.round{
    width:35px;
    height:35px;
    border-radius:50%;
}

.plus{
    background:#00c060;
}

.minus{
    background:#ff5a5a;
}

.controls input{
    flex:1;
    height:40px;
    border:2px solid #00c060;
    border-radius:15px;
}

.damageInput {
    flex:1;
    height:40px;
    border:2px solid #00c060;
    border-radius:15px;
    margin-bottom: 20px;
}

.coins{
    display:flex;
    gap:6px;
    margin:10px 0 15px;
}

.coins button{
    width:35px;
    height:35px;
    border-radius:50%;
    background:#808080;
}

.apply{
    width:120px;
    display:block;
    margin:auto;
}

.categorias{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.actions{
    border-radius: 20px;
    padding: 20px;
    background-color: #a6a6a6;
    width:200px;
    display:flex;
    flex-direction:column;
    gap:8px;
}

.weather{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:4px;
    padding:8px;
}

.weather button{
    width:75px;
    height:75px;
    font-size: 40px;
}

.actions > button{
    width:100%;
    height: 40px;
    margin-top:8px;
}

.CheckPlayerBTN {
    appearance: none;
    -webkit-appearance: none;

    width: 50px;
    height: 50px;

    border: none;
    border-radius: 50%;

    background: #ccc;
    cursor: pointer;

    transition: 0.2s;
    border: #00c060;
}

.LogOutBTN {
    padding: 10px;
    width: 10%;
}

.CheckPlayerBTN:checked {
    background: #39a6ee;
}

    <script type="module">


import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
    getFirestore,
    doc,
    updateDoc,
    increment,
    setDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

/* ================= FIREBASE ================= */

const firebaseConfig = {
  apiKey: "AIzaSyAM-ZU4ho0qs3jRWUXZEHrUM82bz3vvlro",
  authDomain: "rpgsys-ae4bc.firebaseapp.com",
  databaseURL: "https://rpgsys-ae4bc-default-rtdb.firebaseio.com",
  projectId: "rpgsys-ae4bc",
  storageBucket: "rpgsys-ae4bc.firebasestorage.app",
  messagingSenderId: "22232601003",
  appId: "1:22232601003:web:cf38df9fbcf442c79b42ee"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= CHECK LOGIN ================= */

const user = JSON.parse(localStorage.getItem("rpgsys_user"));

if (!user) window.location.href = "index.html";
if (user.role !== "GM") window.location.href = "events.html";

/* ================= ELEMENTOS ================= */

const btnHeal = document.getElementById("btnHeal");
const btnDamage = document.getElementById("btnDamage");
const damageInput = document.getElementById("damageInput");
const applyDamage = document.getElementById("applyDamage");

const caInput = document.getElementById("caInput");
const xpInput = document.getElementById("xpInput");

const applyCa = document.getElementById("applyCa");
const applyXp = document.getElementById("applyXp");

/* ================= MODOS ================= */

let modoHP = "heal";
let modoCA = "add";
let modoXP = "add";

/* ================= HP MODE ================= */

btnHeal?.addEventListener("click", () => {
    modoHP = "heal";
    damageInput.style.border = "2px solid #00c060";
});

btnDamage?.addEventListener("click", () => {
    modoHP = "damage";
    damageInput.style.border = "2px solid #ff5a5a";
});

/* ================= CA MODE ================= */

document.getElementById("btnCaPlus")?.addEventListener("click", () => {
    modoCA = "add";
    caInput.style.border = "2px solid #00c060";
});

document.getElementById("btnCaMinus")?.addEventListener("click", () => {
    modoCA = "remove";
    caInput.style.border = "2px solid #ff5a5a";
});

/* ================= XP MODE ================= */

document.getElementById("btnXpPlus")?.addEventListener("click", () => {
    modoXP = "add";
    xpInput.style.border = "2px solid #00c060";
});

document.getElementById("btnXpMinus")?.addEventListener("click", () => {
    modoXP = "remove";
    xpInput.style.border = "2px solid #ff5a5a";
});

/* ================= SELEÇÃO SEGURA ================= */

function jogadoresSelecionados() {

    const checks = document.querySelectorAll(".CheckPlayerBTN");
    const ids = [];

    checks.forEach(check => {

        if (check.checked) {

            const id = check.getAttribute("data-player");

            if (id) ids.push(id);

        }

    });

    console.log("Jogadores selecionados:", ids);

    return ids;
}

/* ================= HP ================= */

async function aplicarHP() {

    const valor = Number(damageInput.value);

    if (!valor || valor <= 0) return;

    const jogadores = jogadoresSelecionados();

    for (const id of jogadores) {

        console.log("HP update ->", id);

        await updateDoc(doc(db, "users", id), {
            hp: increment(
                modoHP === "heal" ? valor : -valor
            )
        });

    }

    damageInput.value = "";
}

/* ================= CA ================= */

async function aplicarCA() {

    const valor = Number(caInput.value);

    if (!valor || valor <= 0) return;

    const jogadores = jogadoresSelecionados();

    for (const id of jogadores) {

        console.log("CA update ->", id);

        await updateDoc(doc(db, "users", id), {
            ca: increment(
                modoCA === "add" ? valor : -valor
            )
        });

    }

    caInput.value = "";
}

/* ================= XP ================= */

async function aplicarXP() {

    const valor = Number(xpInput.value);

    if (!valor || valor <= 0) return;

    const jogadores = jogadoresSelecionados();

    for (const id of jogadores) {

        console.log("XP update ->", id);

        await updateDoc(doc(db, "users", id), {
            xp: increment(
                modoXP === "add" ? valor : -valor
            )
        });

    }

    xpInput.value = "";
}

/* ================= BIND BOTÕES ================= */

applyDamage?.addEventListener("click", aplicarHP);
applyCa?.addEventListener("click", aplicarCA);
applyXp?.addEventListener("click", aplicarXP);

/* ================= INVENTÁRIO ================= */

window.abrirInventario = async function (playerId) {

    await setDoc(doc(db, "events", playerId), {
        action: "openInventory",
        timestamp: Date.now()
    }, { merge: true });

};

/* ================= LOGOUT ================= */

window.logout = function () {
    localStorage.removeItem("rpgsys_user");
    window.location.href = "index.html";
};

</script>
